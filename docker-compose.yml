version: '3.9'

services:
  # ── Backend API ──────────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wfm-api
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      APP_URL: ${APP_URL}
      FORECAST_SERVICE_URL: http://forecast-service:8001
    depends_on:
      - db
      - forecast-service
    restart: unless-stopped
    networks:
      - wfm-network

  # ── Frontend (served by nginx) ───────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID}
    container_name: wfm-frontend
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - wfm-network

  # ── Forecast Microservice (Python FastAPI) ────────────────────────────────────
  forecast-service:
    build:
      context: ./forecast-service
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      - DATA_API_URL=https://bank-api-pnp9.onrender.com/data
      - DATA_CACHE_TTL_SECONDS=3600
      - DATA_CACHE_DIR=/app/cache
      - PORT=8001
      - DEBUG=false
    volumes:
      - forecast-cache:/app/cache
    restart: unless-stopped
    networks:
      - wfm-network

  # ── Local SQL Server (for development only) ───────────────────────────────────
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: wfm-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: ${SQL_SA_PASSWORD:-DevPassword123!}
      MSSQL_PID: Express
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    restart: unless-stopped
    networks:
      - wfm-network

volumes:
  sqldata:
  forecast-cache:

networks:
  wfm-network:
    driver: bridge
