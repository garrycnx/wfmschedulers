# Build and deploy Node.js (Express + Prisma) backend to Azure App Service
name: Build and deploy Backend - wfmschedulers-api

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/backend-deploy.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install all dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client (for Linux – matches Azure runtime)
        working-directory: backend
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Compile TypeScript
        working-directory: backend
        run: npm run build

      - name: Prepare deployment package
        working-directory: backend
        run: |
          # Copy Prisma schema into dist/
          mkdir -p dist/prisma
          cp prisma/schema.prisma dist/prisma/schema.prisma

          # Create node_modules.tar.gz from our pre-built node_modules
          # (includes .prisma/client generated above)
          # Oryx startup script extracts this with: tar -xzf node_modules.tar.gz -C /node_modules
          # so the tar must contain the CONTENTS of node_modules, not the directory itself
          echo "Creating node_modules.tar.gz with pre-generated Prisma client..."
          tar -czf dist/node_modules.tar.gz -C node_modules .

          # Write a minimal package.json
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json','utf8'));
            pkg.scripts = { start: 'node index.js' };
            delete pkg.devDependencies;
            fs.writeFileSync('dist/package.json', JSON.stringify(pkg, null, 2));
          "

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: backend-app
          path: backend/dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: backend-app

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'wfmschedulers-api'
          slot-name: 'Production'
          package: .
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE_BACKEND }}
