# Build and deploy Node.js (Express + Prisma) backend to Azure App Service
name: Build and deploy Backend - wfmschedulers-api

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/backend-deploy.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install all dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client (for Linux – matches Azure runtime)
        working-directory: backend
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Compile TypeScript
        working-directory: backend
        run: npm run build

      - name: Prepare deployment package
        working-directory: backend
        run: |
          # Write a deployment-specific package.json (start script adjusted for deploy root)
          cat > dist/package.json << 'EOF'
          {
            "name": "wfm-schedule-backend",
            "version": "1.0.0",
            "scripts": {
              "start": "node_modules/.bin/prisma db push --skip-generate && node index.js",
              "postinstall": "prisma generate"
            },
            "dependencies": {
              "prisma": "^5.8.0",
              "@prisma/client": "^5.8.0",
              "axios": "^1.6.5",
              "bcryptjs": "^2.4.3",
              "compression": "^1.7.4",
              "cors": "^2.8.5",
              "dotenv": "^16.3.1",
              "express": "^4.18.2",
              "express-rate-limit": "^7.1.5",
              "helmet": "^7.1.0",
              "jsonwebtoken": "^9.0.2",
              "morgan": "^1.10.0",
              "multer": "^1.4.5-lts.1",
              "zod": "^3.22.4"
            }
          }
          EOF

          # Copy Prisma schema (required by Prisma runtime)
          mkdir -p dist/prisma
          cp prisma/schema.prisma dist/prisma/schema.prisma

          # Install only production deps inside dist/
          cd dist
          npm install --omit=dev

          # Generate Prisma client into dist/node_modules using the CLI from the parent
          cd ..
          node_modules/.bin/prisma generate --schema=dist/prisma/schema.prisma

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: backend-app
          path: backend/dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: backend-app

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'wfmschedulers-api'
          slot-name: 'Production'
          package: .
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE_BACKEND }}
