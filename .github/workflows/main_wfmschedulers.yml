# Build and deploy React (Vite) frontend to Azure App Service
name: Build and deploy Node.js app to Azure Web App - wfmschedulers

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Vite app
        working-directory: frontend
        run: npm run build

      - name: Prepare deployment package
        working-directory: frontend
        run: |
          # Create a minimal package.json inside dist (no "type:module" which confuses Azure)
          cat > dist/package.json << 'EOF'
          {
            "name": "wfm-club-frontend",
            "version": "1.0.0",
            "scripts": {
              "start": "node node_modules/serve/build/main.js -s . -l 8080"
            },
            "dependencies": {
              "serve": "^14.2.1"
            }
          }
          EOF

          # Install only serve into dist/node_modules
          cd dist
          npm install --omit=dev

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: frontend/dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_9F3CC9C1F72E4FBAA1470E1893839447 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_12753C9456E445D0BD30FB86A078653C }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_46253F5DCB61486DAD5AA359C4C0B7AE }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'wfmschedulers'
          slot-name: 'Production'
          package: .
