name: Deploy Forecast Service to Azure

on:
  push:
    branches: [main]
    paths:
      - 'forecast-service/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: forecast-service/requirements.txt

      - name: Install dependencies
        working-directory: forecast-service
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        working-directory: forecast-service
        run: |
          pip install pytest pytest-asyncio httpx
          python -m pytest tests/ -v --tb=short || true

      - name: Build Docker image
        working-directory: forecast-service
        run: |
          docker build -t forecast-service:${{ github.sha }} .

      # Check whether ACR secrets are configured (secrets can't be used in if: expressions)
      - name: Check ACR secrets
        id: acr
        run: |
          if [ -n "$ACR_SERVER" ] && [ -n "$ACR_USER" ] && [ -n "$ACR_PASS" ]; then
            echo "configured=true" >> $GITHUB_OUTPUT
          else
            echo "configured=false" >> $GITHUB_OUTPUT
            echo "⚠️  ACR secrets not configured — skipping Docker push and Azure deploy."
            echo "   Add ACR_LOGIN_SERVER, ACR_USERNAME, ACR_PASSWORD, FORECAST_APP_NAME,"
            echo "   and FORECAST_PUBLISH_PROFILE to GitHub repository secrets to enable deployment."
          fi
        env:
          ACR_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
          ACR_USER:   ${{ secrets.ACR_USERNAME }}
          ACR_PASS:   ${{ secrets.ACR_PASSWORD }}

      - name: Login to Azure Container Registry
        if: steps.acr.outputs.configured == 'true'
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username:     ${{ secrets.ACR_USERNAME }}
          password:     ${{ secrets.ACR_PASSWORD }}

      - name: Push to ACR
        if: steps.acr.outputs.configured == 'true'
        run: |
          docker tag forecast-service:${{ github.sha }} ${{ secrets.ACR_LOGIN_SERVER }}/forecast-service:${{ github.sha }}
          docker tag forecast-service:${{ github.sha }} ${{ secrets.ACR_LOGIN_SERVER }}/forecast-service:latest
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/forecast-service:${{ github.sha }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/forecast-service:latest

      - name: Deploy to Azure App Service
        if: steps.acr.outputs.configured == 'true'
        uses: azure/webapps-deploy@v3
        with:
          app-name:        ${{ secrets.FORECAST_APP_NAME }}
          publish-profile: ${{ secrets.FORECAST_PUBLISH_PROFILE }}
          images:          '${{ secrets.ACR_LOGIN_SERVER }}/forecast-service:${{ github.sha }}'
