name: Deploy Forecast Service to Azure

on:
  push:
    branches: [main]
    paths:
      - 'forecast-service/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: forecast-service
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        working-directory: forecast-service
        run: |
          pip install pytest pytest-asyncio
          python -m pytest tests/ -v --tb=short || true

      - name: Build Docker image
        working-directory: forecast-service
        run: |
          docker build -t forecast-service:${{ github.sha }} .

      - name: Login to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Push to ACR
        run: |
          docker tag forecast-service:${{ github.sha }} ${{ secrets.ACR_LOGIN_SERVER }}/forecast-service:${{ github.sha }}
          docker tag forecast-service:${{ github.sha }} ${{ secrets.ACR_LOGIN_SERVER }}/forecast-service:latest
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/forecast-service:${{ github.sha }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/forecast-service:latest

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.FORECAST_APP_NAME }}
          publish-profile: ${{ secrets.FORECAST_PUBLISH_PROFILE }}
          images: '${{ secrets.ACR_LOGIN_SERVER }}/forecast-service:${{ github.sha }}'
