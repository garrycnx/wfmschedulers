name: Deploy Forecast Service to Azure

on:
  push:
    branches: [main]
    paths:
      - 'forecast-service/**'
  workflow_dispatch:

env:
  ACR_CONFIGURED: ${{ secrets.ACR_LOGIN_SERVER != '' && secrets.ACR_USERNAME != '' && secrets.ACR_PASSWORD != '' }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: forecast-service/requirements.txt

      - name: Install dependencies
        working-directory: forecast-service
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        working-directory: forecast-service
        run: |
          pip install pytest pytest-asyncio httpx
          python -m pytest tests/ -v --tb=short || true

      - name: Build Docker image
        working-directory: forecast-service
        run: |
          docker build -t forecast-service:${{ github.sha }} .

      # ── Azure deployment (only runs when ACR secrets are configured) ──────────

      - name: Login to Azure Container Registry
        if: ${{ secrets.ACR_LOGIN_SERVER != '' && secrets.ACR_USERNAME != '' }}
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Push to ACR
        if: ${{ secrets.ACR_LOGIN_SERVER != '' && secrets.ACR_USERNAME != '' }}
        run: |
          docker tag forecast-service:${{ github.sha }} ${{ secrets.ACR_LOGIN_SERVER }}/forecast-service:${{ github.sha }}
          docker tag forecast-service:${{ github.sha }} ${{ secrets.ACR_LOGIN_SERVER }}/forecast-service:latest
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/forecast-service:${{ github.sha }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/forecast-service:latest

      - name: Deploy to Azure App Service
        if: ${{ secrets.ACR_LOGIN_SERVER != '' && secrets.FORECAST_PUBLISH_PROFILE != '' }}
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.FORECAST_APP_NAME }}
          publish-profile: ${{ secrets.FORECAST_PUBLISH_PROFILE }}
          images: '${{ secrets.ACR_LOGIN_SERVER }}/forecast-service:${{ github.sha }}'

      - name: Deployment skipped — ACR secrets not configured
        if: ${{ secrets.ACR_LOGIN_SERVER == '' || secrets.ACR_USERNAME == '' }}
        run: |
          echo "⚠️  Azure deployment skipped — add ACR_LOGIN_SERVER, ACR_USERNAME, ACR_PASSWORD,"
          echo "   FORECAST_APP_NAME, and FORECAST_PUBLISH_PROFILE secrets to enable."
          echo "   Build and tests passed ✅"
